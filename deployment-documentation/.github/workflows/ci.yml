===
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apiwatch
          POSTGRES_PASSWORD: apiwatch_secret
          POSTGRES_DB: apiwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        env:
          DATABASE_URL: postgres://apiwatch:apiwatch_secret@localhost:5432/apiwatch_test
          NODE_ENV: test
        run: npm test

      - name: Build
        run: npm run build --if-present

      - name: Build Docker image
        run: docker build -f deployment-documentation/Dockerfile -t apiwatch:ci .